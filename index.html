<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project O-2706</title>

  <style>
    :root {
      --bg: #050505;
      --text: #f5f1e8;
      --muted: #8f8a80;
      --gold: #c9a45c;
      --line: rgba(201, 164, 92, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(201,164,92,0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .wrap {
      width: min(92vw, 760px);
      padding: 48px 24px;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 26px;
    }

    h1 {
      font-size: clamp(42px, 9vw, 92px);
      font-weight: 500;
      letter-spacing: -0.06em;
      margin: 0;
      line-height: 0.95;
    }

    .date {
      margin-top: 24px;
      font-size: clamp(18px, 3vw, 26px);
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 46px auto;
      width: min(420px, 70%);
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 0 auto;
      max-width: 620px;
    }

    .unit {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px 10px 18px;
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(10px);
    }

    .num {
      font-size: clamp(32px, 7vw, 58px);
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    .txt {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .footer {
      margin-top: 42px;
      font-size: 15px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }

      .unit {
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="label">Private access</div>

    <h1>PROJECT<br />O-2706</h1>

    <div class="date">27.06.2026 / 07:00</div>

    <div class="divider"></div>

    <section class="countdown">
      <div class="unit">
        <div class="num" id="days">00</div>
        <div class="txt">Days</div>
      </div>
      <div class="unit">
        <div class="num" id="hours">00</div>
        <div class="txt">Hours</div>
      </div>
      <div class="unit">
        <div class="num" id="minutes">00</div>
        <div class="txt">Minutes</div>
      </div>
      <div class="unit">
        <div class="num" id="seconds">00</div>
        <div class="txt">Seconds</div>
      </div>
    </section>

    <div class="footer">Be ready.</div>
  </main>

  <script>
    const targetDate = new Date("2026-06-27T07:00:00+02:00").getTime();

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.querySelector(".wrap").innerHTML = `
          <div class="label">Access granted</div>
          <h1>REPORT<br />READY</h1>
          <div class="date">27.06.2026 / 07:00</div>
          <div class="divider"></div>
          <div class="footer">Await instructions.</div>
        `;
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("days").textContent = pad(days);
      document.getElementById("hours").textContent = pad(hours);
      document.getElementById("minutes").textContent = pad(minutes);
      document.getElementById("seconds").textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
