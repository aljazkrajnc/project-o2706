<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKrivec</title>

<style>
:root {
  --bg: #f6f8fc;
  --panel: #ffffff;
  --text: #202124;
  --muted: #5f6368;
  --line: #dadce0;
  --blue: #1a73e8;
  --hover: #f1f3f4;
  --active: #eef3fd;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
}

.loading-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: grid;
  place-items: center;
  transition: opacity 0.55s ease, visibility 0.55s ease;
}

.loading-screen.hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-box {
  width: min(82vw, 340px);
  text-align: center;
}

.loader-title {
  font-size: 14px;
  letter-spacing: 0.28em;
  color: var(--text);
  margin-bottom: 12px;
}

.loader-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 22px;
}

.loader-track {
  width: 100%;
  height: 3px;
  background: #e3e7ee;
  border-radius: 999px;
  overflow: hidden;
}

.loader-line {
  height: 100%;
  width: 42%;
  background: var(--blue);
  border-radius: 999px;
  animation: loadingMove 1.1s infinite ease-in-out;
}

@keyframes loadingMove {
  0% { transform: translateX(-110%); }
  100% { transform: translateX(260%); }
}

.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 64px 1fr;
}

.topbar {
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-size: 21px;
  font-weight: 500;
  color: var(--muted);
}

.search {
  flex: 1;
  background: #eef3f8;
  border-radius: 24px;
  padding: 12px 16px;
  color: var(--muted);
  font-size: 14px;
}

.user {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--blue);
  color: white;
  display: grid;
  place-items: center;
  font-weight: bold;
  font-size: 13px;
  flex: 0 0 auto;
}

.main {
  display: grid;
  grid-template-columns: 250px 1fr;
  min-height: calc(100vh - 64px);
}

.sidebar {
  padding: 18px 12px;
}

.compose {
  width: 140px;
  padding: 15px 18px;
  border-radius: 18px;
  background: #c2e7ff;
  color: #001d35;
  font-weight: 600;
  margin-bottom: 22px;
}

.nav-item {
  padding: 10px 18px;
  border-radius: 0 18px 18px 0;
  font-size: 14px;
}

.nav-item.active {
  background: #d3e3fd;
  font-weight: bold;
}

.content {
  background: var(--panel);
  border-radius: 18px 0 0 0;
  display: grid;
  grid-template-columns: 420px 1fr;
  border-left: 1px solid var(--line);
  min-width: 0;
}

.mail-list {
  border-right: 1px solid var(--line);
  overflow-y: auto;
}

.mail-row {
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  background: white;
}

.mail-row:hover { background: var(--hover); }
.mail-row.active { background: var(--active); }

.mail-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
  margin-bottom: 6px;
}

.sender-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.unread-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--blue);
  flex: 0 0 auto;
}

.sender {
  font-weight: bold;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.date {
  color: var(--muted);
  white-space: nowrap;
}

.subject {
  font-weight: bold;
  margin-bottom: 5px;
}

.preview {
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.viewer {
  padding: 34px 42px;
  overflow-y: auto;
  min-width: 0;
}

.empty {
  height: 100%;
  display: grid;
  place-items: center;
  color: var(--muted);
  text-align: center;
  padding: 24px;
}

.mail-title {
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 22px;
}

.meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 34px;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--blue);
  color: white;
  display: grid;
  place-items: center;
  font-weight: bold;
  font-size: 13px;
}

.meta-text { font-size: 14px; }
.meta-text strong { display: block; }

.mail-body {
  font-size: 16px;
  line-height: 1.65;
  max-width: 680px;
}

.signature {
  margin-top: 34px;
  color: var(--muted);
}

.back {
  display: none;
  margin-bottom: 22px;
  color: var(--blue);
  cursor: pointer;
  font-size: 14px;
}

@media (max-width: 820px) {
  body { background: var(--panel); }

  .app {
    grid-template-rows: 58px 1fr;
  }

  .topbar {
    height: 58px;
    padding: 0 12px;
    justify-content: space-between;
  }

  .logo {
    font-size: 20px;
    flex: 1;
  }

  .search {
    display: none;
  }

  .user {
    margin-left: auto;
  }

  .main {
    display: block;
    min-height: calc(100vh - 58px);
  }

  .sidebar {
    display: none;
  }

  .content {
    display: block;
    border-radius: 0;
    border-left: none;
  }

  .mail-list {
    border-right: none;
  }

  .mail-list::before {
    content: "Tapni sporočilo za odpiranje";
    display: block;
    padding: 12px 16px;
    font-size: 13px;
    color: #5f6368;
    background: #f6f8fc;
    border-bottom: 1px solid #dadce0;
  }

  .mail-row {
    position: relative;
    padding: 17px 42px 17px 16px;
  }

  .mail-row::after {
    content: "›";
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #5f6368;
    font-size: 24px;
  }

  .viewer {
    display: none;
    padding: 22px 18px;
  }

  .content.open-message .mail-list {
    display: none;
  }

  .content.open-message .viewer {
    display: block;
  }

  .back {
    display: inline-block;
  }

  .mail-title {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <div class="loader-title">eKrivec</div>
    <div class="loader-subtitle">Nalagam ...</div>
    <div class="loader-track">
      <div class="loader-line"></div>

<div class="app">

  <main class="main">
    <aside class="sidebar">
      <div class="compose">Novo</div>

    <section class="content" id="content">

      <article class="viewer" id="viewer">
        <div class="empty">Izberi sporočilo</div>

  </main>

var now = new Date();
now.setDate(now.getDate() + 15);
const mailList = document.getElementById("mailList");
const viewer = document.getElementById("viewer");
const content = document.getElementById("content");

function isUnlocked(email) {
  return now >= new Date(email.unlock);
}

function isRead(id) {
  return localStorage.getItem(`read_${id}`) === "true";
}

function markAsRead(id) {
  localStorage.setItem(`read_${id}`, "true");
}

function getUnlockedEmails() {
  return emails.filter(isUnlocked);
}

function updateNotificationCount() {
  const unreadCount = getUnlockedEmails().filter(email => !isRead(email.id)).length;

  if (unreadCount > 0) {
    document.title =
      `(${unreadCount}) ${unreadCount === 1 ? "novo sporočilo" : "nova sporočila"} - eKrivec`;
  } else {
    document.title = "eKrivec";
  }
}

function renderList(activeId = null) {
  mailList.innerHTML = "";

  const unlockedEmails = getUnlockedEmails();

  unlockedEmails.forEach((email, index) => {
    const row = document.createElement("div");
    const unread = !isRead(email.id);
    const isActive = activeId ? email.id === activeId : index === 0;

    row.className = "mail-row" + (isActive ? " active" : "");

    row.innerHTML = `
      <div class="mail-top">
        <div class="sender-wrap">
          ${unread ? '<div class="unread-dot"></div>' : ''}
          <div class="sender">${email.from}</div>
        </div>
        <div class="date">${email.date}</div>
      </div>
      <div class="subject">${email.subject}</div>
      <div class="preview">${email.preview}</div>
    `;

    row.addEventListener("click", () => {
      markAsRead(email.id);
      renderEmail(email);
      renderList(email.id);
      updateNotificationCount();
      content.classList.add("open-message");
    });

    mailList.appendChild(row);
  });

  if (unlockedEmails.length === 0) {
    mailList.innerHTML = `
      <div style="
        padding:40px;
        text-align:center;
        color:#5f6368;
      ">
        Ni novih sporočil
      </div>
    `;
  }
}

function renderEmail(email) {
  viewer.innerHTML = `
    <div class="back" onclick="goBack()">← Nazaj na prejeto</div>

    <div class="mail-title">${email.subject}</div>

    <div class="meta">
      <div class="avatar">MK</div>
      <div class="meta-text">
        od: ${email.from}</br>
        za: mene
      </div>
    </div>

    <div class="mail-body">
      ${email.body}
    </div>
  `;
}

function goBack() {
  content.classList.remove("open-message");
}

const unlockedEmails = getUnlockedEmails();

renderList();

if (unlockedEmails.length > 0) {
  viewer.innerHTML = `
    <div class="empty">
      Izberi sporočilo iz mape »Prejeto«
    </div>
  `;
} else {
  viewer.innerHTML = '<div class="empty">Ni novih sporočil</div>';
}

updateNotificationCount();

window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loadingScreen").classList.add("hidden");
  }, 1400);
});
</script>
