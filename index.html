<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKrivec Pošta</title>

<style>
:root {
  --bg: #f6f8fc;
  --panel: #ffffff;
  --text: #202124;
  --muted: #5f6368;
  --line: #dadce0;
  --blue: #1a73e8;
  --hover: #f1f3f4;
  --active: #eef3fd;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
}

/* LOADING SCREEN */
.loading-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: grid;
  place-items: center;
  transition: opacity 0.55s ease, visibility 0.55s ease;
}

.loading-screen.hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-box {
  width: min(82vw, 340px);
  text-align: center;
}

.loader-title {
  font-size: 14px;
  letter-spacing: 0.28em;
  color: var(--text);
  margin-bottom: 12px;
}

.loader-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 22px;
}

.loader-track {
  width: 100%;
  height: 3px;
  background: #e3e7ee;
  border-radius: 999px;
  overflow: hidden;
}

.loader-line {
  height: 100%;
  width: 42%;
  background: var(--blue);
  border-radius: 999px;
  animation: loadingMove 1.1s infinite ease-in-out;
}

@keyframes loadingMove {
  0% { transform: translateX(-110%); }
  100% { transform: translateX(260%); }
}

/* APP */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 64px 1fr;
}

.topbar {
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-size: 21px;
  font-weight: 500;
  color: var(--muted);
}

.search {
  flex: 1;
  background: #eef3f8;
  border-radius: 24px;
  padding: 12px 16px;
  color: var(--muted);
  font-size: 14px;
}

.user {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #1a73e8;
  color: white;
  display: grid;
  place-items: center;
  font-weight: bold;
  font-size: 13px;
  flex: 0 0 auto;
}

.main {
  display: grid;
  grid-template-columns: 250px 1fr;
  min-height: calc(100vh - 64px);
}

.sidebar {
  padding: 18px 12px;
}

.compose {
  width: 140px;
  padding: 15px 18px;
  border-radius: 18px;
  background: #c2e7ff;
  color: #001d35;
  font-weight: 600;
  margin-bottom: 22px;
}

.nav-item {
  padding: 10px 18px;
  border-radius: 0 18px 18px 0;
  font-size: 14px;
}

.nav-item.active {
  background: #d3e3fd;
  font-weight: bold;
}

.content {
  background: var(--panel);
  border-radius: 18px 0 0 0;
  display: grid;
  grid-template-columns: 420px 1fr;
  border-left: 1px solid var(--line);
  min-width: 0;
}

.mail-list {
  border-right: 1px solid var(--line);
  overflow-y: auto;
}

.mail-row {
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  background: white;
}

.mail-row:hover { background: var(--hover); }
.mail-row.active { background: var(--active); }

.mail-row.locked {
  opacity: 0.65;
  cursor: default;
  background: #fafafa;
}

.mail-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
  margin-bottom: 6px;
}

.sender { font-weight: bold; }
.date { color: var(--muted); white-space: nowrap; }

.subject {
  font-weight: bold;
  margin-bottom: 5px;
}

.preview {
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.viewer {
  padding: 34px 42px;
  overflow-y: auto;
  min-width: 0;
}

.empty {
  height: 100%;
  display: grid;
  place-items: center;
  color: var(--muted);
}

.mail-title {
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 22px;
}

.meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 34px;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #1a73e8;
  color: white;
  display: grid;
  place-items: center;
  font-weight: bold;
  font-size: 13px;
}

.meta-text { font-size: 14px; }
.meta-text strong { display: block; }

.mail-body {
  font-size: 16px;
  line-height: 1.65;
  max-width: 680px;
}

.signature {
  margin-top: 34px;
  color: var(--muted);
}

.back {
  display: none;
  margin-bottom: 22px;
  color: var(--blue);
  cursor: pointer;
  font-size: 14px;
}

/* MOBILE */
@media (max-width: 820px) {
  body { background: var(--panel); }

  .app {
    grid-template-rows: 58px 1fr;
  }

  .topbar {
    height: 58px;
    padding: 0 12px;
  }

  .logo {
    font-size: 20px;
  }

  .search {
    display: none;
  }

  .main {
    display: block;
    min-height: calc(100vh - 58px);
  }

  .sidebar {
    display: none;
  }

  .content {
    display: block;
    border-radius: 0;
    border-left: none;
  }

  .mail-list {
    border-right: none;
  }

  .viewer {
    display: none;
    padding: 22px 18px;
  }

  .content.open-message .mail-list {
    display: none;
  }

  .content.open-message .viewer {
    display: block;
  }

  .back {
    display: inline-block;
  }

  .mail-title {
    font-size: 24px;
  }

  .mail-row {
    padding: 17px 16px;
  }
}
</style>
</head>

<body>

<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <div class="loader-title">eKrivec</div>
    <div class="loader-subtitle">Nalagam ...</div>
    <div class="loader-track">
      <div class="loader-line"></div>
    </div>
  </div>
</div>

<div class="app">
  <header class="topbar">
    <div class="logo">eKrivec</div>
    <div class="search">Išči po pošti</div>
    <div class="user">MK</div>
  </header>

  <main class="main">
    <aside class="sidebar">
      <div class="compose">Novo</div>
      <div class="nav-item active">Prejeto</div>
      <div class="nav-item">Z zvezdico</div>
      <div class="nav-item">Odloženo</div>
      <div class="nav-item">Poslano</div>
      <div class="nav-item">Osnutki</div>
    </aside>

    <section class="content" id="content">
      <div class="mail-list" id="mailList"></div>
      <article class="viewer" id="viewer">
        <div class="empty">Izberi sporočilo</div>
      </article>
    </section>
  </main>
</div>

<script>
const emails = [
  {
    unlock: "2026-06-16T00:00:00+02:00",
    from: "od: moji.prijatelji@ekrivec.si",
    subject: "Tok tok ... a je kdo doma?",
    date: "16. jun",
    preview: "Hej, se vidimo 27.6. Več informacij sledi kmalu ...",
    body: `
      <p>Hej,</p>
      <p>se vidimo <strong>27.6.</strong></p>
      <p>Več informacij sledi kmalu ...</p>
      <p>P.S.: Ne pozabi, to je zdaj tvoj novi email.</p>
      <p class="signature">— Tvoji zvesti prijatelji</p>
    `
  },
  {
    unlock: "2026-06-17T00:00:00+02:00",
    from: "Project 2706",
    subject: "Navodila #02",
    date: "17. jun",
    preview: "Dogodek bo zahteval celodnevno prisotnost.",
    body: `
      <p>Navodila #02</p>
      <p>Dogodek bo zahteval celodnevno prisotnost.</p>
      <p>Točen potek ostaja zaupen.</p>
      <p class="signature">— Project 2706</p>
    `
  },
  {
    unlock: "2026-06-18T00:00:00+02:00",
    from: "Project 2706",
    subject: "Navodila #03",
    date: "18. jun",
    preview: "Nočitev je potrjena. Pakiranje bo potrebno.",
    body: `
      <p>Navodila #03</p>
      <p>Nočitev je potrjena.</p>
      <p>Pakiranje bo potrebno.</p>
      <p>Podrobnosti sledijo.</p>
      <p class="signature">— Project 2706</p>
    `
  },
  {
    unlock: "2026-06-19T00:00:00+02:00",
    from: "Project 2706",
    subject: "Navodila #04",
    date: "19. jun",
    preview: "Kopalke priporočene. Razlog ostaja zaupen.",
    body: `
      <p>Navodila #04</p>
      <p>Kopalke priporočene.</p>
      <p>Razlog ostaja zaupen.</p>
      <p>Ne postavljaj preveč vprašanj.</p>
      <p class="signature">— Project 2706</p>
    `
  },
  {
    unlock: "2026-06-20T00:00:00+02:00",
    from: "Project 2706",
    subject: "Navodila #05",
    date: "20. jun",
    preview: "Udobna obutev priporočena. Povratek ni potrjen.",
    body: `
      <p>Navodila #05</p>
      <p>Udobna obutev priporočena.</p>
      <p>Povratek: ni potrjen.</p>
      <p>Morala: mora ostati visoka.</p>
      <p class="signature">— Project 2706</p>
    `
  },
  {
    unlock: "2026-06-21T00:00:00+02:00",
    from: "Project 2706",
    subject: "Zadnja navodila",
    date: "21. jun",
    preview: "Jutri bodi pripravljen. Nadaljnja navodila bodo podana pravočasno.",
    body: `
      <p>Zadnja navodila</p>
      <p>Jutri bodi pripravljen.</p>
      <p>Nadaljnja navodila bodo podana pravočasno.</p>
      <p>Ne zamujaj.</p>
      <p class="signature">— Project 2706</p>
    `
  }
];

const now = new Date();
const mailList = document.getElementById("mailList");
const viewer = document.getElementById("viewer");
const content = document.getElementById("content");

function isUnlocked(email) {
  return now >= new Date(email.unlock);
}

function renderList() {
  mailList.innerHTML = "";

  const unlockedEmails = emails.filter(isUnlocked);

  unlockedEmails.forEach((email, index) => {

    const row = document.createElement("div");

    row.className =
      "mail-row" +
      (index === 0 ? " active" : "");

    row.innerHTML = `
      <div class="mail-top">
        <div class="sender">${email.from}</div>
        <div class="date">${email.date}</div>
      </div>
      <div class="subject">${email.subject}</div>
      <div class="preview">${email.preview}</div>
    `;

    row.addEventListener("click", () => {
      document.querySelectorAll(".mail-row").forEach(r =>
        r.classList.remove("active")
      );

      row.classList.add("active");

      renderEmail(email);

      content.classList.add("open-message");
    });

    mailList.appendChild(row);
  });

  if (unlockedEmails.length === 0) {
    mailList.innerHTML = `
      <div style="
        padding:40px;
        text-align:center;
        color:#5f6368;
      ">
        Ni novih sporočil
      </div>
    `;
  }
}

function renderEmail(email) {
  viewer.innerHTML = `
    <div class="back" onclick="goBack()">← Nazaj na prejeto</div>

    <div class="mail-title">${email.subject}</div>

    <div class="meta">
      <div class="avatar">MK</div>
      <div class="meta-text">
        <strong>${email.from}</strong>
        za: za mene
      </div>
    </div>

    <div class="mail-body">
      ${email.body}
    </div>
  `;
}

function goBack() {
  content.classList.remove("open-message");
}

renderList();

const unlockedEmails = emails.filter(isUnlocked);

if (unlockedEmails.length > 0) {
  renderEmail(unlockedEmails[0]);
} else {
  viewer.innerHTML =
    '<div class="empty">Ni novih sporočil</div>';
}

/* Browser tab notification */
const lastSeenCount =
  Number(localStorage.getItem("project2706_seen_count") || 0);

const currentCount = unlockedEmails.length;
const newMessages = Math.max(0, currentCount - lastSeenCount);

if (newMessages > 0) {
  document.title = `(${newMessages}) novo sporočilo - Pošta`;
} else {
  document.title = "eKrivec";
}

localStorage.setItem(
  "project2706_seen_count",
  String(currentCount)
);

window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loadingScreen").classList.add("hidden");
  }, 1400);
});
</script>

</body>
</html>
